<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HYPERBOLE Studio</title>
<link rel="stylesheet" href="css/app.css?v=8">
</head>
<body>

<header id="topbar">
  <div class="brand">HYPERBOLE™ STUDIO</div>
  <div class="topbar-controls">
    <label class="dd-label">
      <span>Generator</span>
      <select id="generatorSelect">
        <option value="wireframe">Wireframe Forward</option>
        <option value="glitch">Glitch Morph</option>
        <option value="dither">Image Dither</option>
        <option value="audioViz">Audio Visualizer</option>
      </select>
    </label>
    <label class="dd-label">
      <span>Aspect</span>
      <select id="aspectSelect">
        <option value="16:9" selected>16:9</option>
        <option value="1:1">1:1</option>
        <option value="4:3">4:3</option>
        <option value="4:5">4:5</option>
      </select>
    </label>
    <label class="dd-label">
      <span>Accent</span>
      <input type="color" id="accentColor" value="#ffffff">
    </label>
  </div>
</header>

<main id="main">
  <section id="stage-wrapper">
    <div id="stage">
      <canvas id="cv"></canvas>
    </div>
    <div id="stage-info">
      <span id="aspectDisplay">16:9</span>
      <span id="fpsDisplay">— FPS</span>
    </div>
  </section>

  <aside id="sidebar">
    <div class="panel-header">PARAMETERS</div>
    <div id="paramPanel"></div>

    <div class="panel-header">EXPORT</div>
    <div id="exportPanel">
      <div class="ctrl">
        <label>Output Width
          <input type="number" id="exportW" value="1920" min="64" max="7680">
        </label>
      </div>
      <div class="ctrl">
        <label>Output Height
          <input type="number" id="exportH" value="1080" min="64" max="7680">
        </label>
      </div>
      <div class="ctrl">
        <label>FPS
          <input type="number" id="exportFps" value="30" min="1" max="60">
        </label>
      </div>
      <div class="ctrl">
        <label>Loop Duration (s)
          <input type="number" id="exportDur" value="4" min="0.1" max="60" step="0.1">
        </label>
      </div>

      <div class="ctrl" id="staticBtnRow" style="display:none;">
        <button id="exportStaticBtn" class="btn-secondary">EXPORT STILL PNG</button>
      </div>
      <div class="ctrl">
        <button id="exportBtn">EXPORT PNG SEQUENCE</button>
      </div>
      <div id="exportStatus"></div>
      <div class="export-hint">
        Output: <span id="exportFrames">120</span> frames as ZIP
      </div>
    </div>
  </aside>
</main>

<div id="errBox"></div>

<!-- libs (locally bundled minified) -->
<script src="js/lib/jszip.min.js"></script>
<script src="js/lib/filesaver.min.js"></script>

<!-- generators -->
<script src="js/generators/wireframe.js?v=8"></script>
<script src="js/generators/glitch.js?v=8"></script>
<script src="js/generators/dither.js?v=8"></script>
<script src="js/generators/audio-viz.js?v=8"></script>

<!-- core -->
<script src="js/exporter.js?v=8"></script>
<script src="js/app.js?v=8"></script>

</body>
</html>
